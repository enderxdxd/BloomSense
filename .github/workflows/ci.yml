name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/bloomsense_ci?schema=public
  DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/bloomsense_ci?schema=public
  NEXTAUTH_SECRET: ci-nextauth-secret-minimum-32-characters
  NEXTAUTH_URL: http://localhost:3000
  OPENAI_API_KEY: sk-ci-placeholder
  STRIPE_SECRET_KEY: sk_test_ci_placeholder
  STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
  UPSTASH_REDIS_REST_URL: ''
  UPSTASH_REDIS_REST_TOKEN: ''
  SUPABASE_URL: ''
  SUPABASE_SERVICE_ROLE_KEY: ''

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Test
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build
